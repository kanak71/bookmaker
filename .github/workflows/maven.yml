name: Java CI with Maven

# 어떤 Branch라도 코드가 push될 때마다 workflow 가 실행되도록 함
on:
  push:
    branches:
      - "**"

# Jobs를 통해서 workflow 단계 만들어 준다
jobs:
  build-bookmark-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./bookmarker-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

# Maven Build 작업시 권한을 설정 접근 허용 +x 실행 권한
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw verify

# docker tty 명령어를 사용하기 위한 환경설정
      - name: Build and Push Image
        if: github.ref == 'refs/heads/main'
        # 현재 실행되고 있는 OS는 내 local PC가 아니라 github의 PC이다. 그렇기 때문에 dockerBuild는 필요 없고 build만 하는게 좋다
        run: |
          ./mvnw clean package jib:dockerBuild -DskipTests
          docker login \
            -u ${{ secrets.DOCKER_USERNAME }} \
            -p ${{ secrets.DOCKER_PASSWORD }}
          docker build \
            -t myimage:latest .
          docker tag myimage:latest ${{ secrets.DOCKER_USERNAME }}/bookmarker-api:latest
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/bookmarker-api:latest


#######################################################
#         bookmark-ui-nextjs 빌드 및 docker 배포       #
#######################################################
build-bookmarker-ui:
  name: Build bookmarker-ui
  runs-on: ubuntu-latest

  defaults:
    run:
      working-directory: ./bookmark-ui-nextjs

  steps:
    # 코드 체크아웃
    - name: Checkout repository
      uses: actions/checkout@v5

    # Node.js 설정
    - name: Setup Node.js 22
      uses: actions/setup-node@v5
      with:
        node-version: 22

    # 의존성 설치
    - name: Install dependencies
      run: npm ci

    # Next.js Build
    # 로컬 검증 용도
    - name: Next.js Build
      env:
        SERVER_SIDE_API_BASE_URL: ${{ secrets.SERVER_SIDE_API_BASE_URL }}
        NEXT_PUBLIC_CLIENT_SIDE_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_CLIENT_SIDE_API_BASE_URL }}
      run: npm run build

    # main 브랜치인 경우 Docker 이미지 빌드 및 배포
    - if: github.ref == 'refs/heads/main'
      name: Build and Push Docker image
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

        docker build \
          --build-arg SERVER_SIDE_API_BASE_URL="${{ secrets.SERVER_SIDE_API_BASE_URL }}" \
          --build-arg NEXT_PUBLIC_CLIENT_SIDE_API_BASE_URL="${{ secrets.NEXT_PUBLIC_CLIENT_SIDE_API_BASE_URL }}" \
          -f Dockerfile.ui \
          -t ${{ secrets.DOCKER_USERNAME }}/bookmark-ui-nextjs:latest .

        docker push \
          ${{ secrets.DOCKER_USERNAME }}/bookmark-ui-nextjs:latest